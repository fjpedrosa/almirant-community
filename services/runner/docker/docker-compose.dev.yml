version: "3.9"

services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: almirant-docker-proxy-dev
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
      EXEC: 1
      VOLUMES: 0
      SWARM: 0
      NODES: 0
      SERVICES: 0
      TASKS: 0
      SECRETS: 0
      CONFIGS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  runner:
    profiles: ["runner"]
    build:
      context: ../..
      dockerfile: services/runner/Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: 3002
      MAX_CONCURRENT: 1
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - ../../:/app/source:ro
      - ../repos:/app/repos
    ports:
      - "3002:3002"
    depends_on:
      - docker-proxy

  web-bridge:
    profiles: ["web-bridge"]
    build:
      context: ../..
      dockerfile: services/web-bridge/Dockerfile
    working_dir: /app/services/web-bridge
    command: ["bun", "--watch", "src/index.ts"]
    environment:
      PORT: 3004
      REDIS_URL: redis://host.docker.internal:6379
      BACKEND_API_URL: http://host.docker.internal:3001
    volumes:
      - ../../web-bridge/src:/app/services/web-bridge/src
      - ../../../backend/packages/stream-consumer/src:/app/backend/packages/stream-consumer/src
    ports:
      - "3004:3004"

  discord-bridge:
    profiles: ["discord-bridge"]
    build:
      context: ../..
      dockerfile: services/discord-bridge/Dockerfile
    working_dir: /app/services/discord-bridge
    command: ["bun", "--watch", "src/index.ts"]
    environment:
      PORT: 3003
      REDIS_URL: redis://host.docker.internal:6379
      BACKEND_API_URL: http://host.docker.internal:3001
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-}
    volumes:
      - ../../discord-bridge/src:/app/services/discord-bridge/src
      - ../../../backend/packages/remote-agent/src:/app/backend/packages/remote-agent/src
      - ../../../backend/packages/stream-consumer/src:/app/backend/packages/stream-consumer/src
    ports:
      - "3003:3003"

  scaler:
    profiles: ["scaler"]
    build:
      context: ../..
      dockerfile: services/scaler/Dockerfile
    working_dir: /app/services/scaler
    command: ["bun", "--watch", "src/index.ts"]
    environment:
      PORT: 3003
      REDIS_URL: redis://host.docker.internal:6379
      ALMIRANT_API_URL: http://host.docker.internal:3001
      ALMIRANT_API_KEY: ${ALMIRANT_API_KEY:-}
      HETZNER_API_TOKEN: ${HETZNER_API_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      MC_API_KEY: ${MC_API_KEY:-}
    volumes:
      - ../../scaler/src:/app/services/scaler/src
    ports:
      - "3005:3003"
