# Almirant egress proxy - allowlist only
# Used by agent containers to restrict outbound traffic to approved domains.

acl allowed_domains dstdomain .github.com
acl allowed_domains dstdomain .githubusercontent.com
acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .openai.com
acl allowed_domains dstdomain generativelanguage.googleapis.com
acl allowed_domains dstdomain .almirant.ai
acl allowed_domains dstdomain mcp.context7.com
acl allowed_domains dstdomain .npmjs.org
acl allowed_domains dstdomain registry.npmjs.org
acl allowed_domains dstdomain bun.sh
acl allowed_domains dstdomain .z.ai
acl allowed_domains dstdomain .x.ai

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_domains
http_access deny all

http_port 3128
coredump_dir /var/spool/squid
# Use Squid's default log destinations. Writing stdio logs as user `proxy`
# breaks startup in the ubuntu/squid image because /dev/stdout is not writable.
cache deny all
