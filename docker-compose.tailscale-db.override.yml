# docker-compose.tailscale-db.override.yml
#
# Managed private database access over Tailscale.
# This override is applied by the updater sidecar from /settings/instance.
# It does NOT publish Postgres on the host. Instead, a Tailscale node named
# `almirant-db` listens on tailnet port 5432 and forwards to the internal
# Docker service `postgres:5432`.
#
# Runtime secrets are written to ./data/tailscale-db.env by the updater.

services:
  tailscale-db:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: almirant-db
    env_file:
      - ./data/tailscale-db.env
    volumes:
      - tailscale_db_state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    networks:
      - almirant-prod

  postgres-tailnet-proxy:
    image: alpine/socat:latest
    restart: unless-stopped
    network_mode: service:tailscale-db
    command:
      - -dd
      - TCP-LISTEN:5432,fork,reuseaddr
      - TCP:postgres:5432
    depends_on:
      - tailscale-db
      - postgres

volumes:
  tailscale_db_state:
