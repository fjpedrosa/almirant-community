[databases]
; Connection to external PostgreSQL — credentials come from env vars via userlist.txt
; The actual host/port/dbname are templated by the entrypoint script
almirant_prod = host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME}

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction-level pooling — connections are returned to the pool after each transaction
; This is the key setting that multiplexes many clients over few real connections
pool_mode = transaction

; Real PostgreSQL connections (server-side)
default_pool_size = 15
min_pool_size = 5
max_db_connections = 30
reserve_pool_size = 5
reserve_pool_timeout = 3

; Client-side limits (how many app connections can be open)
max_client_conn = 200

; Timeouts
server_idle_timeout = 300
client_idle_timeout = 600
server_login_retry = 3

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Admin access
admin_users = almirant_db
