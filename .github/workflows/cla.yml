name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    name: "CLA Assistant"
    # Public-repo only: never run in forks (e.g. the private almirant-cloud fork).
    if: github.repository == 'fjpedrosa/almirant-community'
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Signatures are stored in-repo on the default branch. The action
          # creates this file on first sign — do not create it manually.
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/fjpedrosa/almirant-community/blob/main/CLA.md'
          # Signatures live on a dedicated, unprotected branch so the bot can
          # commit them even while `main` is protected.
          branch: 'cla-signatures'
          # Maintainers/owners and bots are exempt from signing.
          allowlist: 'fjpedrosa,*[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-comment: 'All contributors have signed the Almirant CLA. Thank you!'
          custom-notsigned-comment: 'Thank you for your contribution. Before we can merge, please read the [Contributor License Agreement](https://github.com/fjpedrosa/almirant-community/blob/main/CLA.md) and sign it by posting the comment below in this PR.'
