name: Publish Docker images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Optional extra Docker tag to publish.
        required: false
        type: string

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: almirant-backend
            context: .
            file: backend/api/Dockerfile
            target: ""
          - image: almirant-db-init
            context: .
            file: backend/api/Dockerfile
            target: builder
          - image: almirant-frontend
            context: ./frontend
            file: frontend/Dockerfile
            target: ""
          - image: almirant-runner
            context: .
            file: services/runner/Dockerfile
            target: ""
          - image: almirant-web-bridge
            context: .
            file: services/web-bridge/Dockerfile
            target: ""
          - image: almirant-discord-bridge
            context: .
            file: services/discord-bridge/Dockerfile
            target: ""
          - image: almirant-updater
            context: .
            file: services/updater/Dockerfile
            target: ""
          - image: almirant-claude-shim
            context: .
            file: services/runner-claude/Dockerfile
            target: ""
          - image: almirant-codex-shim
            context: .
            file: services/runner/docker/Dockerfile.codex
            target: ""
          - image: almirant-opencode-shim
            context: .
            file: services/runner/docker/Dockerfile.opencode
            target: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.vendor=Almirant

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          platforms: ${{ vars.DOCKER_PLATFORMS || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALMIRANT_BUILD_SHA=${{ github.sha }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://localhost' }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || '/api' }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || '' }}
            BETTER_AUTH_URL=${{ vars.BETTER_AUTH_URL || '' }}
            BETTER_AUTH_TRUSTED_ORIGINS=${{ vars.BETTER_AUTH_TRUSTED_ORIGINS || '' }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: index.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
