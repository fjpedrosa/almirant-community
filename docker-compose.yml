# Almirant self-hosted/local stack.
# Single command to boot the product locally from source code.

name: almirant

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: almirant-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-almirant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-almirant_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-almirant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - almirant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-almirant} -d ${POSTGRES_DB:-almirant}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: almirant-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - almirant
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  db-init:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
      target: builder
    container_name: almirant-db-init
    restart: "no"
    working_dir: /app/backend/packages/database
    command: >
      sh -lc "
        echo '⏳ Bootstrapping local database...' &&
        bun run ./src/preview/bootstrap-local.ts
      "
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-almirant}:${POSTGRES_PASSWORD:-almirant_dev_password}@postgres:5432/${POSTGRES_DB:-almirant}
    volumes:
      - ./backend/packages/database/src:/app/backend/packages/database/src
      - ./backend/packages/database/migrations:/app/backend/packages/database/migrations
      - ./backend/packages/database/drizzle.config.ts:/app/backend/packages/database/drizzle.config.ts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - almirant

  backend:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
      target: builder
    container_name: almirant-backend
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    working_dir: /app/backend/api
    command: ["bun", "--watch", "src/index.ts"]
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,https://frontend.almirant.orb.local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-almirant}:${POSTGRES_PASSWORD:-almirant_dev_password}@postgres:5432/${POSTGRES_DB:-almirant}
      REDIS_URL: redis://redis:6379
      ALMIRANT_STORAGE_DIR: /app/storage
    volumes:
      - ./backend/api/src:/app/backend/api/src
      - ./backend/packages:/app/backend/packages
      - almirant_storage:/app/storage
    networks:
      - almirant
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    image: oven/bun:1.3.8-alpine
    container_name: almirant-frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    working_dir: /app
    command: ["sh", "-lc", "bun install && bun run next dev --hostname 0.0.0.0 --port 3000"]
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001/ws}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      BACKEND_URL: http://backend:3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-almirant}:${POSTGRES_PASSWORD:-almirant_dev_password}@postgres:5432/${POSTGRES_DB:-almirant}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3000,https://frontend.almirant.orb.local}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-almirant-local-dev-better-auth-secret-2026}
      INTERNAL_EMAIL_API_SECRET: ${INTERNAL_EMAIL_API_SECRET:-almirant-local-dev-email-secret-2026}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - almirant
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/llms.txt || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 45s

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: almirant-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
      EXEC: 1
      VOLUMES: 0
      SWARM: 0
      NODES: 0
      SERVICES: 0
      TASKS: 0
      SECRETS: 0
      CONFIGS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - almirant

  runner:
    build:
      context: .
      dockerfile: services/runner/Dockerfile
    container_name: almirant-runner
    restart: unless-stopped
    ports:
      - "${RUNNER_PORT:-3002}:3002"
    working_dir: /app/services/runner
    command: ["bun", "--watch", "src/index.ts"]
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: "3002"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DOCKER_HOST: tcp://docker-proxy:2375
      ALMIRANT_API_URL: http://backend:3001
      ALMIRANT_API_KEY: ${ALMIRANT_API_KEY:-alm_sa_03a9fd877e5dde3cdc283b0a7c28b6bc19d6206303feedff2daab4f77d28962e}
      REDIS_URL: redis://redis:6379
      REPOS_HOST_PATH: ${PWD}/services/runner/repos
      PLATFORM_CONFIG_PATH: /app/platform-config
      ENABLE_BROWSER: ${ENABLE_BROWSER:-false}
      WEB_OUTPUT_ENABLED: ${WEB_OUTPUT_ENABLED:-true}
      OPENCODE_IMAGE: ${OPENCODE_IMAGE:-almirant-opencode-shim:1.14.31}
      CLAUDE_SHIM_IMAGE: ${CLAUDE_SHIM_IMAGE:-almirant-claude-shim:2.1.126}
      CODEX_SHIM_IMAGE: ${CODEX_SHIM_IMAGE:-almirant-codex-shim:0.128.0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/runner/src:/app/services/runner/src
      - ./services/runner/tsconfig.json:/app/services/runner/tsconfig.json
      - ./backend/packages:/app/backend/packages
      - ./node_modules:/app/node_modules
      - ./.agents/skills:/app/platform-config/.agents/skills
      - ./.agents/agents:/app/platform-config/.agents/agents
      - ./.agents/skills:/app/platform-config/.claude/skills
      - ./.agents/agents:/app/platform-config/.claude/agents
      - ./services/runner/platform-config/AGENTS.md.platform:/app/platform-config/AGENTS.md.platform
      - ./services/runner/platform-config/CLAUDE.md.platform:/app/platform-config/CLAUDE.md.platform
      - ./services/runner/repos:/app/repos
    networks:
      - almirant
    depends_on:
      docker-proxy:
        condition: service_started
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web-bridge:
    build:
      context: .
      dockerfile: services/web-bridge/Dockerfile
    container_name: almirant-web-bridge
    restart: unless-stopped
    ports:
      - "${WEB_BRIDGE_PORT:-3004}:3004"
    working_dir: /app/services/web-bridge
    command: ["bun", "--watch", "src/index.ts"]
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: "3004"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: redis://redis:6379
      BACKEND_API_URL: http://backend:3001
      BRIDGE_API_KEY: ${ALMIRANT_API_KEY:-alm_sa_03a9fd877e5dde3cdc283b0a7c28b6bc19d6206303feedff2daab4f77d28962e}
    volumes:
      - ./services/web-bridge/src:/app/services/web-bridge/src
      - ./backend/packages/stream-consumer/src:/app/backend/packages/stream-consumer/src
    networks:
      - almirant
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  discord-bridge:
    profiles: ["discord-bridge"]
    build:
      context: .
      dockerfile: services/discord-bridge/Dockerfile
    container_name: almirant-discord-bridge
    restart: unless-stopped
    ports:
      - "${DISCORD_BRIDGE_PORT:-3003}:3003"
    working_dir: /app/services/discord-bridge
    command: ["bun", "--watch", "src/index.ts"]
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: "3003"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: redis://redis:6379
      BACKEND_API_URL: http://backend:3001
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      BRIDGE_API_KEY: ${ALMIRANT_API_KEY:-alm_sa_03a9fd877e5dde3cdc283b0a7c28b6bc19d6206303feedff2daab4f77d28962e}
    volumes:
      - ./services/discord-bridge/src:/app/services/discord-bridge/src
      - ./backend/packages/remote-agent/src:/app/backend/packages/remote-agent/src
      - ./backend/packages/stream-consumer/src:/app/backend/packages/stream-consumer/src
    networks:
      - almirant
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  claude-shim:
    profiles: ["shims"]
    build:
      context: .
      dockerfile: services/runner-claude/Dockerfile
    image: almirant-claude-shim:2.1.126

  codex-shim:
    profiles: ["shims"]
    build:
      context: .
      dockerfile: services/runner/docker/Dockerfile.codex
    image: almirant-codex-shim:0.128.0

  opencode-shim:
    profiles: ["shims"]
    build:
      context: .
      dockerfile: services/runner/docker/Dockerfile.opencode
    image: almirant-opencode-shim:1.14.31

networks:
  almirant:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  almirant_storage:
