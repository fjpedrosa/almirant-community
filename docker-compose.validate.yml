# Ephemeral validation environment for /validate --full
# Usage: VALIDATE_SESSION=validate-xxx VALIDATE_FRONTEND_PORT=4000 docker compose -f docker-compose.validate.yml up -d --build
# Teardown: docker compose -f docker-compose.validate.yml down -v

name: ${VALIDATE_SESSION:-validate}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: validate_user
      POSTGRES_PASSWORD: validate_password
      POSTGRES_DB: validate_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U validate_user -d validate_db"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - validate-net
    tmpfs:
      - /var/lib/postgresql/data

  migrate-and-seed:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://validate_user:validate_password@postgres:5432/validate_db
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "cd /app/backend/packages/database && bun run ./src/scripts/migrate-with-validation.ts"
    networks:
      - validate-net
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://validate_user:validate_password@postgres:5432/validate_db
      PORT: "3001"
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:${VALIDATE_FRONTEND_PORT:-4000}
    depends_on:
      postgres:
        condition: service_healthy
      migrate-and-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - validate-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.validate
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${VALIDATE_BACKEND_PORT:-3001}
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - "${VALIDATE_FRONTEND_PORT:-4000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 90s
    networks:
      - validate-net

networks:
  validate-net:
    driver: bridge
